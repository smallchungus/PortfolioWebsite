name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, feat/*]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '18'

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint code
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          directory: ./coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: dist/
          retention-days: 3

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (informational)
        run: npm audit || echo "Audit found issues - checking for critical/high severity only"
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: npm audit --audit-level=high

  auto-merge-to-main:
    name: Auto-merge dev → main
    runs-on: ubuntu-latest
    needs: [test-and-build, security]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge dev to main
        run: |
          echo "🔄 All quality gates passed on dev branch"
          echo "🚀 Auto-merging dev → main"
          git checkout main
          git merge --no-ff origin/dev -m "chore: auto-merge dev to main after CI success"
          git push origin main
          echo "✅ Successfully merged to main"

  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [test-and-build, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deployment notification
        run: |
          echo "🎉 All quality checks passed on main!"
          echo "🚀 Vercel will auto-deploy to: https://willchennn.com"
          echo "📊 View deployment status at: https://vercel.com/dashboard"